<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIIP Level 4 - Lesson 9 Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Khmer', 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
            -webkit-tap-highlight-color: transparent;
        }
        .quiz-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.3s ease-in-out;
        }
        .hidden-el { display: none; }
        .khmer-text { color: #4b5563; font-size: 0.9rem; margin-top: 4px; }
        .powerup-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .powerup-active {
            background-color: #3b82f6 !important;
            color: white !important;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

<div id="app" class="max-w-2xl mx-auto px-4 pt-6">
    <!-- Header Area -->
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-bold text-blue-800">KIIP Level 4 (មេរៀន ៩)</h1>
            <p class="text-sm text-gray-500">한국의 대중문화 (វប្បធម៌ប្រជាប្រិយ)</p>
        </div>
        <div class="text-right">
            <span id="score-display" class="text-lg font-bold text-green-600">ពិន្ទុ: 0</span>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
        <div id="progress" class="bg-blue-600 h-2.5 rounded-full progress-bar" style="width: 0%"></div>
    </div>

    <!-- Game Screen -->
    <div id="quiz-container">
        <!-- Question Card -->
        <div class="bg-white rounded-2xl p-6 quiz-card mb-4 relative">
            <div class="flex justify-between items-start mb-4">
                <span id="question-number" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded-full">សំណួរ ១/៣០</span>
                <div class="flex gap-2">
                    <button onclick="speakText('ko')" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition" title="អានកូរ៉េ">🇰🇷 🔈</button>
                    <button onclick="speakText('km')" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition" title="អានខ្មែរ">🇰🇭 🔈</button>
                </div>
            </div>

            <!-- Power-ups Bar -->
            <div id="powerups" class="flex flex-wrap gap-2 mb-6">
                <button id="pu-translate-q" onclick="usePowerUp('translateQ')" class="powerup-btn bg-white border border-blue-500 text-blue-600 hover:bg-blue-50">
                    🔍 បកប្រែសំណួរ
                </button>
                <button id="pu-fifty-fifty" onclick="usePowerUp('fiftyFifty')" class="powerup-btn bg-white border border-purple-500 text-purple-600 hover:bg-purple-50">
                    ✂️ កាត់ 50/50
                </button>
                <button id="pu-translate-a" onclick="usePowerUp('translateA')" class="powerup-btn bg-white border border-green-500 text-green-600 hover:bg-green-50">
                    📖 បកប្រែចម្លើយ
                </button>
            </div>

            <!-- Question Text -->
            <div id="question-text" class="text-lg font-bold text-gray-800 mb-2 leading-relaxed">
                <!-- Korean Question -->
            </div>
            <div id="question-translate" class="text-blue-600 italic mb-4 hidden">
                <!-- Khmer Question Translation -->
            </div>

            <!-- Options -->
            <div id="options-grid" class="space-y-3">
                <!-- Options will be generated here -->
            </div>
        </div>

        <!-- Explanation Card (Hidden until answered) -->
        <div id="explanation-container" class="hidden">
            <div class="bg-green-50 border border-green-200 rounded-2xl p-6 mb-4">
                <h3 class="font-bold text-green-800 mb-2 flex items-center gap-2">
                    ✅ ការពន្យល់លម្អិត
                </h3>
                <div id="explanation-text" class="text-gray-700 text-sm leading-relaxed mb-4"></div>
                <div class="border-t border-green-100 pt-4">
                    <h4 class="font-bold text-xs uppercase text-gray-500 mb-2">បំបែកពាក្យសព្ទ (Vocabulary)</h4>
                    <div id="vocab-breakdown" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>
            <button id="next-btn" onclick="nextQuestion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                បន្តទៅសំណួរបន្ទាប់
            </button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden text-center bg-white rounded-3xl p-10 quiz-card">
        <div class="text-6xl mb-4">🏆</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">អបអរសាទរ! អ្នកបានបញ្ចប់តេស្ត</h2>
        <p id="final-score" class="text-4xl font-black text-blue-600 mb-6">0 / 30</p>
        <div class="flex flex-col gap-3">
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md">
                សាកល្បងម្ដងទៀត
            </button>
            <button onclick="startReview()" class="w-full bg-gray-100 text-gray-700 font-bold py-4 rounded-xl border border-gray-200">
                ឆែកមើលចម្លើយឡើងវិញ
            </button>
        </div>
    </div>
</div>

<script>
    const questions = [
        // PART 1: Vocabulary & Grammar (1-10)
        {
            type: "vocab",
            q: "K-Pop 가수들이 전 세계적으로 큰 (      )을/를 끌면서 한류가 확산되고 있다.",
            kmQ: "ដោយសារតារាចម្រៀង K-Pop កំពុងទាក់ទាញ (      ) យ៉ាងខ្លាំងនៅជុំវិញពិភពលោក ទើបរលកវប្បធម៌កូរ៉េ (Hallyu) កំពុងរីកសាយភាយ។",
            options: ["흥행", "인기", "연기", "연출"],

            correct: 1,
            explanation: "인기를 끌다 ជាកន្សោមពាក្យមានន័យថា 'ទាក់ទាញប្រជាប្រិយភាព'។ ក្នុងបរិបទនេះ គឺនិយាយពីភាពល្បីល្បាញរបស់តារា K-Pop។",
            vocab: [
                {k: "인기를 끌다", km: "ទាក់ទាញប្រជាប្រិយភាព"},
                {k: "확산되다", km: "រីកសាយភាយ"},
                {k: "전 세계적", km: "ទូទាំងពិភពលោក"}
            ]
        },
        {
            type: "vocab",
            q: "요즘은 TV 대신 스마트폰으로 방송을 (      )하는 사람들이 늘고 있다.",
            kmQ: "សព្វថ្ងៃនេះ ចំនួនមនុស្សដែល (      ) កម្មវិធីទូរទស្សន៍តាមរយៈស្មាតហ្វូនជំនួសឱ្យទូរទស្សន៍កំពុងតែកើនឡើង។",
            options: ["방영", "공연", "시청", "청취"],
            kmOptions: ["ការចាក់ផ្សាយ", "ការសម្ដែង", "ការទស្សនា", "ការស្ដាប់"],
            correct: 2,
            explanation: "시청하다 ត្រូវបានប្រើសម្រាប់ការមើលកម្មវិធីដែលមើលឃើញរូបភាព (ដូចជាទូរទស្សន៍ ឬវីដេអូ)។",

        {

            kmQ: "ក៖ តើរឿងដែលបានមើលកាលពីម្សិលមិញយ៉ាងម៉េចដែរ?<br>ខ៖ ដោយសារអ្នកសម្ដែងសម្ដែងបានល្អខ្លាំងពេក សាច់រឿងគឺ (      )។",

            vocab: [

        {

            q: "가: 민수 씨가 한국 드라마를 아주 (      ).<br>나: 맞아요. 밤을 새워서 볼 때도 많대요.",

            options: ["즐겨 본다던데", "즐겨 본다더니", "즐겨 본다니요", "즐겨 본다면서요"],
            kmOptions: ["ឮថាចូលចិត្តមើល... (នាំសាច់រឿង)", "ដោយសារឃើញចូលចិត្តមើល (លទ្ធផល)", "តើថាចូលចិត្តមើលអី (បដិសេធ)", "ឮថាចូលចិត្តមើលមែនទេ? (បញ្ជាក់)"],
            correct: 0,
            explanation: "-ㄴ/는다던데 ប្រើដើម្បីលើកយកព័ត៌មានដែលបានឮពីអ្នកដទៃមកនិយាយ ដើម្បីសួរព័ត៌មានបន្ត ឬផ្ដល់មតិ។",
            vocab: [
                {k: "즐겨 보다", km: "ចូលចិត្តមើល/មើលជាប្រចាំ"},
                {k: "밤을 새우다", km: "ដាច់យប់/មិនដេក"},

        },
        {

            q: "다음 밑줄 친 부분과 의미가 비슷한 것을 고르십시오.<br>그 가수의 무대는 매우 <u>화려해서</u> 눈을 뗄 수 없었다.",

                {k: "그렇게", km: "ដល់ថ្នាក់ហ្នឹង"},
                {k: "그냥", km: "គ្រាន់តែ/ធម្មតា"},
                {k: "부르다", km: "ច្រៀង/ហៅ"}

        {

        document.getElementById('pu-translate-q').classList.remove('powerup-active');
        document.getElementById('pu-fifty-fifty').classList.remove('powerup-active');
        document.getElementById('pu-translate-a').classList.remove('powerup-active');

        // If review mode, show answer automatically
        if (isReviewMode) {
            revealAnswer(userAnswers[currentIdx]);
        } else {
            document.getElementById('explanation-container').classList.add('hidden');
        }
    }

    function usePowerUp(type) {
        if (selectedOption !== null || isReviewMode) return;

        const q = questions[currentIdx];
        if (type === 'translateQ') {
            document.getElementById('question-translate').classList.toggle('hidden');
            document.getElementById('pu-translate-q').classList.toggle('powerup-active');
        } 
        else if (type === 'fiftyFifty') {
            if (powerUpsUsed.fiftyFifty) return;
            const buttons = document.querySelectorAll('.option-btn');
            let removedCount = 0;
            const correctIdx = q.correct;
            const indices = [0, 1, 2, 3].filter(i => i !== correctIdx);
            // Randomly pick 2 to hide
            const toHide = indices.sort(() => 0.5 - Math.random()).slice(0, 2);
            toHide.forEach(idx => {
                buttons[idx].style.opacity = '0.3';
                buttons[idx].style.pointerEvents = 'none';
            });
            document.getElementById('pu-fifty-fifty').classList.add('powerup-active');
            powerUpsUsed.fiftyFifty = true;
        } 
        else if (type === 'translateA') {
            const kmLabels = document.querySelectorAll('.khmer-option');
            kmLabels.forEach(el => el.classList.toggle('hidden'));
            document.getElementById('pu-translate-a').classList.toggle('powerup-active');
        }
    }

    function selectOption(idx) {
        if (selectedOption !== null || isReviewMode) return;
        selectedOption = idx;
        userAnswers[currentIdx] = idx;
        
        if (idx === questions[currentIdx].correct) {
            score++;
            document.getElementById('score-display').innerText = `ពិន្ទុ: ${score}`;
        }
        
        revealAnswer(idx);
    }

    function revealAnswer(userIdx) {
        const q = questions[currentIdx];
        const buttons = document.querySelectorAll('.option-btn');
        
        buttons.forEach((btn, i) => {
            btn.style.pointerEvents = 'none';
            if (i === q.correct) {
                btn.classList.add('border-green-500', 'bg-green-50');
                btn.querySelector('span').classList.add('bg-green-500', 'text-white', 'border-green-500');
            } else if (i === userIdx) {
                btn.classList.add('border-red-500', 'bg-red-50');
                btn.querySelector('span').classList.add('bg-red-500', 'text-white', 'border-red-500');
            }
            // Show all translations after answering
            btn.querySelector('.khmer-option').classList.remove('hidden');
        });

        // Show Question Translation
        document.getElementById('question-translate').classList.remove('hidden');

        // Show Explanation
        document.getElementById('explanation-text').innerHTML = q.explanation;
        const vocabContainer = document.getElementById('vocab-breakdown');
        vocabContainer.innerHTML = '';
        q.vocab.forEach(v => {
            const item = document.createElement('div');
            item.className = "flex justify-between items-center bg-white p-2 rounded border border-green-100 text-xs";
            item.innerHTML = `
                <span class="font-bold text-blue-700">${v.k}</span>
                <span class="text-gray-600">${v.km}</span>
                <button onclick="playTTS('${v.k}', 'ko')" class="ml-2 text-blue-400">🔈</button>
            `;
            vocabContainer.appendChild(item);
        });

        document.getElementById('explanation-container').classList.remove('hidden');
        
        // Auto scroll to explanation
        setTimeout(() => {
            document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 300);
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            selectedOption = null;
            showQuestion();
            updateProgress();
        } else {
            showResults();
        }
    }

    function updateProgress() {
        const percent = ((currentIdx) / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
    }

    function showResults() {
        document.getElementById('quiz-container').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        document.getElementById('progress').style.width = '100%';
    }

    function startReview() {
        isReviewMode = true;
        currentIdx = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-container').classList.remove('hidden');
        document.getElementById('next-btn').innerText = "សំណួរបន្ទាប់";
        showQuestion();
    }

    // TTS Functions
    function speakText(lang) {
        const q = questions[currentIdx];
        const text = (lang === 'ko') ? q.q.replace(/<br>/g, ' ').replace(/\(      \)/g, '땡땡땡') : q.kmQ.replace(/<br>/g, ' ');
        playTTS(text, lang);
    }

    function playTTS(text, lang) {
        // Stop any currently playing audio
        if (audioMap.ko) audioMap.ko.pause();
        if (audioMap.km) audioMap.km.pause();

        const cleanText = text.replace(/<\/?[^>]+(>|$)/g, ""); // Remove HTML tags
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=${lang}&client=gtx`;
        
        const audio = new Audio(url);
        audioMap[lang] = audio;
        
        audio.play().catch(e => {
            // Fallback to Web Speech API if Google TTS is blocked
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.lang = lang === 'ko' ? 'ko-KR' : 'km-KH';
            window.speechSynthesis.speak(msg);
        });
    }

    window.onload = initQuiz;
</script>
